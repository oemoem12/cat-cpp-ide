name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgtksourceview-3.0-dev
      
      - name: Build
        run: make
      
      - name: Create DEB package
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps
          
          cp cat-cpp-ide pkg/usr/bin/
          cp cat-cpp-ide.desktop pkg/usr/share/applications/
          cp cat-cpp-ide.png pkg/usr/share/icons/hicolor/48x48/apps/
          
          echo "Package: cat-cpp-ide" > pkg/DEBIAN/control
          echo "Version: 1.0.1" >> pkg/DEBIAN/control
          echo "Section: devel" >> pkg/DEBIAN/control
          echo "Priority: optional" >> pkg/DEBIAN/control
          echo "Architecture: amd64" >> pkg/DEBIAN/control
          echo "Maintainer: oemoem12" >> pkg/DEBIAN/control
          echo "Description: Simple C++ IDE for beginners" >> pkg/DEBIAN/control
          echo "Depends: libgtk-3-0, libgtksourceview-3.0-1, g++" >> pkg/DEBIAN/control
          
          dpkg-deb --build pkg cat-cpp-ide_1.0.1_amd64.deb
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: cat-cpp-ide_1.0.1_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
