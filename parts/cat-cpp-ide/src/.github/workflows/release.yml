name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgtksourceview-3.0-dev

      - name: Build
        run: make

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create DEB package
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps

          cp cat-cpp-ide pkg/usr/bin/
          cp cat-cpp-ide.desktop pkg/usr/share/applications/
          cp cat-cpp-ide.png pkg/usr/share/icons/hicolor/48x48/apps/

          printf 'Package: cat-cpp-ide\nVersion: %s\nSection: devel\nPriority: optional\nArchitecture: amd64\nMaintainer: oemoem12\nDescription: Simple C++ IDE for beginners\nDepends: libgtk-3-0, libgtksourceview-3.0-1, g++\n' "${{ steps.version.outputs.VERSION }}" > pkg/DEBIAN/control

          dpkg-deb --build pkg cat-cpp-ide_${{ steps.version.outputs.VERSION }}_amd64.deb

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.debian.binary-package" \
            --data-binary @cat-cpp-ide_${VERSION}_amd64.deb \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION} | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"id\"]')/assets?name=cat-cpp-ide_${VERSION}_amd64.deb"
