name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgtksourceview-3.0-dev
      
      - name: Build
        run: make
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create DEB package
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/48x48/apps
          
          cp cat-cpp-ide pkg/usr/bin/
          cp cat-cpp-ide.desktop pkg/usr/share/applications/
          cp cat-cpp-ide.png pkg/usr/share/icons/hicolor/48x48/apps/
          
          cat > pkg/DEBIAN/control << EOF
          Package: cat-cpp-ide
          Version: ${{ steps.version.outputs.VERSION }}
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: oemoem12
          Description: Simple C++ IDE for beginners
          Depends: libgtk-3-0, libgtksourceview-3.0-1, g++
          EOF
          
          dpkg-deb --build pkg cat-cpp-ide_${{ steps.version.outputs.VERSION }}_amd64.deb
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: cat-cpp-ide_${{ steps.version.outputs.VERSION }}_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
